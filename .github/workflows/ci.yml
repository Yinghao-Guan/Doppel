name: CI

on:
  pull_request:
  push:
    branches: [main, doppel-frontend]

jobs:
  frontend:
    name: Frontend lint + typecheck + audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lockfile sync check
        run: |
          if [ -n "$(git status --porcelain pnpm-lock.yaml)" ]; then
            echo "::error::pnpm-lock.yaml drifted after install --frozen-lockfile"
            git diff pnpm-lock.yaml
            exit 1
          fi

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Audit (high severity)
        run: pnpm audit --prod --audit-level=high
        continue-on-error: true

  guardrails:
    name: Repo guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: No committed databases
        run: |
          if git ls-files | grep -E '\.(db|sqlite)$' ; then
            echo "::error::A SQLite database is committed. Add it to .gitignore and git rm --cached."
            exit 1
          fi

      - name: No stale lockfiles
        run: |
          if [ -f frontend/package-lock.json ]; then
            echo "::error::frontend/package-lock.json must not be committed (we use pnpm)."
            exit 1
          fi

      - name: Single Next.js config
        run: |
          if [ -f next.config.ts ] && [ -f frontend/next.config.ts ]; then
            echo "::error::Two next.config.ts files exist. Keep only frontend/next.config.ts."
            exit 1
          fi

      - name: .env.local.example matches code references
        run: |
          # Check that GEMINI_API_KEY (the var the code actually reads) is in the example.
          if ! grep -q "GEMINI_API_KEY" .env.local.example; then
            echo "::error::.env.local.example missing GEMINI_API_KEY."
            exit 1
          fi
